<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShopEasy</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f1f3f6;
}

/* Header */
.header {
  background: #2874f0;
  color: white;
  padding: 10px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.logo {
  font-size: 22px;
  font-weight: bold;
}

.search-box {
  width: 40%;
}

.search-box input {
  width: 100%;
  padding: 8px;
  border: none;
}

.cart {
  cursor: pointer;
}

/* Products */
.container {
  padding: 20px;
}

.products {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 15px;
}

.card {
  background: white;
  padding: 10px;
  border-radius: 5px;
  text-align: center;
}

.card img {
  width: 100%;
  height: 150px;
  object-fit: cover;
}

.card button {
  background: #ff9f00;
  border: none;
  padding: 8px;
  color: white;
  cursor: pointer;
}

/* Footer */
.footer {
  background: #172337;
  color: white;
  text-align: center;
  padding: 10px;
}
</style>
</head>

<body>

<!-- Header -->
<div class="header">
  <div class="logo">ShopEasy</div>
  <div class="search-box">
    <input type="text" placeholder="Search for products...">
  </div>
  <div class="cart">🛒 Cart</div>
</div>

<!-- Products -->
<div class="container">
  <h2>Top Deals</h2>

  <div class="products">
    
    <div class="card">
      <img src="https://via.placeholder.com/200">
      <h4>Mobile Phone</h4>
      <p>₹12,999</p>
      <button>Add to Cart</button>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/200">
      <h4>Laptop</h4>
      <p>₹45,999</p>
      <button>Add to Cart</button>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/200">
      <h4>Headphones</h4>
      <p>₹1,499</p>
      <button>Add to Cart</button>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/200">
      <h4>Shoes</h4>
      <p>₹2,199</p>
      <button>Add to Cart</button>
    </div>

  </div>
</div>

<!-- Footer -->
<div class="footer">
  © 2026 ShopEasy | Demo E-commerce UI
</div>

</body>
</html>
