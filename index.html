<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sonu Kushwaha | Premium Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#05070d;--text:#e6eaf2;--muted:#9aa4b2;--accent:#7dd3fc;--accent2:#a78bfa}
body{margin:0;font-family:Inter;background:var(--bg);color:var(--text);overflow-x:hidden}
canvas{position:fixed;top:0;left:0;z-index:-1}
header{position:sticky;top:0;background:rgba(0,0,0,.5);backdrop-filter:blur(10px);padding:15px}
.hero{max-width:1100px;margin:80px auto;padding:20px}
.title{font-size:48px;font-weight:800}
.typing{color:var(--accent);font-size:22px;margin-top:10px}
.btn{display:inline-block;margin-top:20px;padding:12px 20px;border-radius:30px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#000;font-weight:600}
section{max-width:1100px;margin:40px auto;padding:20px}
.card{background:rgba(255,255,255,.05);padding:20px;border-radius:15px;margin:10px 0}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:15px}
.reveal{opacity:0;transform:translateY(20px);transition:.6s}
.reveal.visible{opacity:1;transform:none}
@media(max-width:900px){.grid{grid-template-columns:1fr}.title{font-size:32px}}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<header>Sonu Kushwaha</header>
<div class="hero">
<div class="title">Linux Admin & DevOps Engineer</div>
<div class="typing" id="typing"></div>
<a class="btn" href="#projects">View Projects</a>
</div>

<section class="reveal">
<h2>Live DevOps Projects</h2>
<div class="grid">
<div class="card"><b>Docker App Deployment</b><br>Flask app containerized & deployed</div>
<div class="card"><b>AWS Infra</b><br>EC2 + S3 + RDS production setup</div>
<div class="card"><b>CI/CD Pipeline</b><br>GitHub Actions automation</div>
</div>
</section>

<section class="reveal">
<h2>Contact</h2>
<div class="card">📧 sonu.it.professional@outlook.com</div>
</section>

<script>
// typing animation
const words=["AWS Specialist","Docker Expert","Linux Engineer","Automation Lover"];
let i=0,j=0,current='',isDeleting=false;
function type(){
 current=words[i];
 document.getElementById('typing').textContent=current.substring(0,j);
 if(!isDeleting && j++===current.length){isDeleting=true;setTimeout(type,1000);return}
 if(isDeleting && j--===0){isDeleting=false;i=(i+1)%words.length}
 setTimeout(type,isDeleting?50:100);
}
type();

// particles background
const canvas=document.getElementById('bg');
const ctx=canvas.getContext('2d');
canvas.width=window.innerWidth;canvas.height=window.innerHeight;
let particles=[];
for(let i=0;i<80;i++)particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:Math.random()-.5,vy:Math.random()-.5});
function animate(){
 ctx.clearRect(0,0,canvas.width,canvas.height);
 ctx.fillStyle='white';
 particles.forEach(p=>{
  p.x+=p.vx;p.y+=p.vy;
  if(p.x<0||p.x>canvas.width)p.vx*=-1;
  if(p.y<0||p.y>canvas.height)p.vy*=-1;
  ctx.fillRect(p.x,p.y,2,2);
 });
 requestAnimationFrame(animate);
}
animate();

// reveal
const obs=new IntersectionObserver(e=>e.forEach(x=>x.isIntersecting&&x.target.classList.add('visible')));
document.querySelectorAll('.reveal').forEach(el=>obs.observe(el));
</script>
</body>
</html>
